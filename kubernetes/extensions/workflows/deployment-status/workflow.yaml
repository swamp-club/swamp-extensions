id: 731aed2b-b876-42e5-84e4-327133e1dfaf
name: "@swamp/kubernetes/deployment-status"
description: Rollout health check for all deployments — replica counts, rollout conditions, ReplicaSet history, and warning events
version: 1
inputs:
  properties:
    deploymentModel:
      type: string
      description: Name of the deployment model instance targeting the namespace
    eventModel:
      type: string
      description: Name of the event model instance targeting the namespace
  required:
    - deploymentModel
    - eventModel
jobs:
  - name: check
    description: Collect deployment specs, rollout conditions, and related events
    steps:
      - name: list-deployments
        description: Fetch all deployments with replica counts, strategy, containers, and rollout conditions
        task:
          type: model_method
          modelIdOrName: ${{ inputs.deploymentModel }}
          methodName: list
      - name: list-events
        description: Fetch all events to correlate with deployment activity (scaling, rollouts, failures)
        task:
          type: model_method
          modelIdOrName: ${{ inputs.eventModel }}
          methodName: list
      - name: get-warnings
        description: Fetch warning events to surface rollout failures, image pull errors, and crash loops
        task:
          type: model_method
          modelIdOrName: ${{ inputs.eventModel }}
          methodName: getWarnings
