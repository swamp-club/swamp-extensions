id: 856cc29a-27c5-4b8e-98bb-69ff7ea30cd7
name: "@swamp/kubernetes/rbac-audit"
description: RBAC security audit — Roles, ClusterRoles, RoleBindings, ClusterRoleBindings, ServiceAccounts, and permission analysis for identifying overly permissive access, wildcard rules, and cluster-admin bindings
version: 1
inputs:
  properties:
    rbacModel:
      type: string
      description: Name of the rbac model instance targeting the namespace
  required:
    - rbacModel
jobs:
  - name: collect
    description: Gather all RBAC resources for permission analysis
    steps:
      - name: list-roles
        description: Fetch all namespace-scoped Roles to audit permission rules (apiGroups, resources, verbs)
        task:
          type: model_method
          modelIdOrName: ${{ inputs.rbacModel }}
          methodName: listRoles
      - name: list-cluster-roles
        description: Fetch all ClusterRoles to identify overly permissive cluster-wide permissions and wildcard rules
        task:
          type: model_method
          modelIdOrName: ${{ inputs.rbacModel }}
          methodName: listClusterRoles
      - name: list-role-bindings
        description: Fetch all namespace RoleBindings to map which subjects (users, groups, SAs) have which role assignments
        task:
          type: model_method
          modelIdOrName: ${{ inputs.rbacModel }}
          methodName: listRoleBindings
      - name: list-cluster-role-bindings
        description: Fetch all ClusterRoleBindings to identify cluster-admin access and broad cluster-wide permissions
        task:
          type: model_method
          modelIdOrName: ${{ inputs.rbacModel }}
          methodName: listClusterRoleBindings
      - name: list-service-accounts
        description: Fetch all ServiceAccounts to check auto-mount token settings and secret associations
        task:
          type: model_method
          modelIdOrName: ${{ inputs.rbacModel }}
          methodName: listServiceAccounts
