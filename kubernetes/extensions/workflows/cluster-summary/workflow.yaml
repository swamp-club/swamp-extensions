id: eaea8dd8-54f0-4d86-ab75-68bd3dd5ec1b
name: "@swamp/kubernetes/cluster-summary"
description: Collect pod inventory and metrics from cluster-pods, then aggregate into a summary with counts by phase, node, restart totals, and health status
version: 1
jobs:
  - name: collect
    description: Fetch all pods from the K8s API and query the metrics-server for CPU/memory usage
    steps:
      - name: list-pods
        description: Fetch all pods in the configured namespace via the K8s API
        task:
          type: model_method
          modelIdOrName: cluster-pods
          methodName: list
      - name: get-metrics
        description: Query the metrics-server for per-pod CPU and memory usage
        task:
          type: model_method
          modelIdOrName: cluster-pods
          methodName: getMetrics
  - name: summarize
    description: Read collected pod data and compute aggregated statistics
    dependsOn:
      - job: collect
        condition:
          type: succeeded
    steps:
      - name: build-summary
        description: Aggregate pods by phase, node, restart count, and health status into a single summary resource
        task:
          type: model_method
          modelIdOrName: pod-summary
          methodName: summarize
