id: 91787d6f-5ad6-4a74-89f8-9dc4ff9444b2
name: "@swamp/kubernetes/namespace-debug"
description: List all pods, services, deployments, and events in a namespace to diagnose connectivity, crash, and rollout issues
version: 2
inputs:
  properties:
    podModel:
      type: string
      description: Name of the pod model instance targeting the namespace
    serviceModel:
      type: string
      description: Name of the service model instance targeting the namespace
    deploymentModel:
      type: string
      description: Name of the deployment model instance targeting the namespace
    eventModel:
      type: string
      description: Name of the event model instance targeting the namespace
  required:
    - podModel
    - serviceModel
    - deploymentModel
    - eventModel
jobs:
  - name: discover
    description: List all pods, services, deployments, and events in the namespace
    steps:
      - name: list-pods
        description: Fetch all pods with their phase, container states, and restart counts
        task:
          type: model_method
          modelIdOrName: ${{ inputs.podModel }}
          methodName: list
      - name: list-services
        description: Fetch all services with their type, ports, and pod selector labels
        task:
          type: model_method
          modelIdOrName: ${{ inputs.serviceModel }}
          methodName: list
      - name: list-deployments
        description: Fetch all deployments with replicas, strategy, containers, and conditions
        task:
          type: model_method
          modelIdOrName: ${{ inputs.deploymentModel }}
          methodName: list
      - name: list-events
        description: Fetch all events in the namespace sorted by timestamp
        task:
          type: model_method
          modelIdOrName: ${{ inputs.eventModel }}
          methodName: list
      - name: get-warnings
        description: Fetch only warning-type events for quick problem identification
        task:
          type: model_method
          modelIdOrName: ${{ inputs.eventModel }}
          methodName: getWarnings
