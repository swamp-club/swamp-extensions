id: fc82018b-d717-49ac-9ecd-f0396d6a6f61
name: "@swamp/kubernetes/service-connectivity"
description: Service connectivity overview — all services, all pods with labels, endpoints, and warning events for diagnosing routing and selector mismatches
version: 2
inputs:
  properties:
    serviceModel:
      type: string
      description: Name of the service model instance targeting the namespace
    podModel:
      type: string
      description: Name of the pod model instance targeting the namespace
    eventModel:
      type: string
      description: Name of the event model instance targeting the namespace
  required:
    - serviceModel
    - podModel
    - eventModel
jobs:
  - name: collect
    description: Gather services, pods, and events to diagnose connectivity issues
    steps:
      - name: list-services
        description: Fetch all services with selectors, ports, and types for selector-vs-label comparison
        task:
          type: model_method
          modelIdOrName: ${{ inputs.serviceModel }}
          methodName: list
      - name: list-pods
        description: Fetch all pods with labels, phase, and container ports for cross-referencing against service selectors
        task:
          type: model_method
          modelIdOrName: ${{ inputs.podModel }}
          methodName: list
      - name: list-events
        description: Fetch all events to identify service-related issues (endpoint changes, failures)
        task:
          type: model_method
          modelIdOrName: ${{ inputs.eventModel }}
          methodName: list
      - name: get-warnings
        description: Fetch warning events for quick identification of connectivity-affecting problems
        task:
          type: model_method
          modelIdOrName: ${{ inputs.eventModel }}
          methodName: getWarnings
