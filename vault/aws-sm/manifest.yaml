manifestVersion: 1
name: "@swamp/aws-sm"
version: "2026.05.23.1"
description: |
  Read and write secrets stored in AWS Secrets Manager, with support for
  vault annotations (`swamp vault annotate` / `swamp vault inspect`).

  ## Authentication

  Uses the default AWS credential chain — no credentials in config. Provide
  credentials via one of:
  - Environment variables: `AWS_ACCESS_KEY_ID`, `AWS_SECRET_ACCESS_KEY`
  - AWS profile: `~/.aws/credentials`
  - IAM role attached to the instance or task

  ## Required IAM Permissions

  - `secretsmanager:GetSecretValue`
  - `secretsmanager:PutSecretValue`
  - `secretsmanager:CreateSecret`
  - `secretsmanager:ListSecrets`
  - `secretsmanager:DescribeSecret`
  - `secretsmanager:UpdateSecret`
  - `secretsmanager:TagResource`
  - `secretsmanager:UntagResource`

  ## Annotations

  Annotations map to native AWS Secrets Manager primitives:
  - **notes** → secret Description field
  - **labels** → resource tags (key-value pairs)
  - **url** → stored as a `swamp:url` tag

  ```bash
  swamp vault annotate my-aws-sm API_KEY \
    --url https://console.aws.amazon.com/iam \
    --note "Production API key" \
    --label env=prod --label team=infra
  swamp vault inspect my-aws-sm API_KEY --json
  ```

  ## Usage

  ```bash
  swamp vault create @swamp/aws-sm my-aws-sm \
    --config '{"region": "us-east-1"}' --json

  swamp vault get my-aws-sm my/secret/name --json
  swamp vault put my-aws-sm my/secret/name "s3cr3t" --json
  swamp vault list-keys my-aws-sm --json
  ```

  ## Secret Key Format

  Secret keys map directly to AWS Secrets Manager secret names, including
  path-style names such as `myapp/production/db-password`.
repository: "https://github.com/systeminit/swamp-extensions"
vaults:
  - aws_sm.ts
additionalFiles:
  - LICENSE.txt
  - README.md
platforms: []
labels:
