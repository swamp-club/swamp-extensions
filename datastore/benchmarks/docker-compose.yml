services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 2s
      timeout: 5s
      retries: 5

  fake-gcs:
    image: fsouza/fake-gcs-server:1.54.0
    command: [
      "-scheme",
      "http",
      "-port",
      "4443",
      "-external-url",
      "http://localhost:4443",
    ]
    ports:
      - "4443:4443"
    healthcheck:
      test: [
        "CMD",
        "wget",
        "--spider",
        "-q",
        "http://localhost:4443/storage/v1/b",
      ]
      interval: 2s
      timeout: 5s
      retries: 5
