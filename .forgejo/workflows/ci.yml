    name: Merge Gate
    if: always()
    needs:
      [
        vault-check,
        vault-lockfile,
        datastore-check,
        datastore-lockfile,
        issue-lifecycle-check,
        issue-lifecycle-lockfile,
        ssh-check,
        ssh-lockfile,
        kubernetes-check,
        kubernetes-lockfile,
        workflows-check,
        workflows-lockfile,
        cve-check,
        cve-lockfile,
        model-check,
        model-lockfile,
        aws-check,
        aws-lockfile,
        cloudflare-check,
        cloudflare-lockfile,
        gcp-check,
        gcp-lockfile,
        codegen-check,
        codegen-lockfile,
        deps-audit,
        actions-audit,
        claude-review,
        claude-adversarial-review,
        claude-ci-security-review,
      ]
